name: Daily Link Checker

on:
  schedule:
    - cron: '0 8 * * *'   # 8:00 AM UTC daily
  workflow_dispatch:       # allow manual runs

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      issues: write        # needed to open/update GitHub issues
      contents: read       # needed to checkout the repo

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check all product URLs
        id: check
        run: node check-links.js --csv products/top-1000.csv --concurrency 5 --output link-report.json
        continue-on-error: true   # don't fail the workflow; we handle it below

      - name: Check title alignment
        id: titlecheck
        run: python3 check-product-title-alignment.py --csv products/top-1000.csv --output title-report.json
        continue-on-error: true

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: link-report-${{ github.run_id }}
          path: |
            link-report.json
            title-report.json
          retention-days: 30

      - name: Open or update GitHub Issue for broken links
        if: steps.check.outcome == 'failure' || steps.titlecheck.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('link-report.json', 'utf8'));
            const titleReport = fs.existsSync('title-report.json')
              ? JSON.parse(fs.readFileSync('title-report.json', 'utf8'))
              : { summary: { mismatches: 0, errors: 0 }, mismatches: [], errors: [] };
            const { summary, broken, timeouts } = report;
            const mismatches = titleReport.mismatches || [];
            const titleErrors = titleReport.errors || [];

            let body = `## Link Check Report — ${report.date.slice(0,10)}\n\n`;
            body += `**Total:** ${summary.total} | **OK:** ${summary.ok} | **Broken:** ${summary.broken} | **Title mismatches:** ${titleReport.summary?.mismatches || 0} | **Title errors:** ${titleReport.summary?.errors || 0} | **Timeouts:** ${summary.timeouts}\n\n`;

            if (broken.length > 0) {
              body += `### Broken Links\n\n| Product | URL | Reason |\n|---------|-----|--------|\n`;
              for (const r of broken) {
                body += `| ${r.name} | [link](${r.url}) | ${r.detail} |\n`;
              }
              body += '\n';
            }

            if (titleErrors.length > 0) {
              body += `### Title Check Errors\n\n| Product | URL | Status | Error |\n|---------|-----|--------|-------|\n`;
              for (const r of titleErrors) {
                body += `| ${r.name} | [link](${r.url}) | ${r.page_status || ''} | ${r.error || ''} |\n`;
              }
              body += '\n';
            }

            if (mismatches.length > 0) {
              body += `### Title Mismatches\n\n| Product | URL | Amazon Title | Coverage |\n|---------|-----|--------------|----------|\n`;
              for (const r of mismatches) {
                body += `| ${r.name} | [link](${r.url}) | ${r.amazonTitle || ''} | ${r.coverage ?? ''} |\n`;
              }
              body += '\n';
            }

            if (timeouts.length > 0) {
              body += `### Timeouts (check manually)\n\n`;
              for (const r of timeouts) {
                body += `- ${r.name}: ${r.url}\n`;
              }
            }

            body += `\n---\n*Generated by [Daily Link Checker](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})*`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['broken-links'],
              state: 'open',
            });

            if (issues.length > 0) {
              // Update existing open issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                title: `[Auto] Broken product links detected — ${report.date.slice(0,10)}`,
                body,
              });
              core.info(`Updated issue #${issues[0].number}`);
            } else {
              // Open a new issue
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Auto] Broken product links detected — ${report.date.slice(0,10)}`,
                body,
                labels: ['broken-links'],
              });
              core.info(`Created issue #${issue.number}`);
            }

      - name: Close issue if all links OK
        if: steps.check.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['broken-links'],
              state: 'open',
            });
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `All links are now healthy as of ${new Date().toISOString().slice(0,10)}. Closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              core.info(`Closed issue #${issue.number}`);
            }
