name: Daily Deals Refresh + Deploy

on:
  schedule:
    # Run every day at 13:00 UTC (8:00 AM Central)
    - cron: '0 13 * * *'
  workflow_dispatch:

concurrency:
  group: daily-deals-refresh
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    name: Daily deal discovery, build, deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    env:
      HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
      HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
      HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
      HOSTINGER_DEST: domains/hotproducts.online/public_html/

    steps:
      - name: Confirm workflow started
        run: |
          echo "::notice::Daily deals refresh workflow started at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: site/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('site/package-lock.json') }}-${{ hashFiles('site/**/*.ts', 'site/**/*.tsx', 'site/**/*.js', 'site/**/*.mjs') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('site/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Fetch limited-time sale batch
        id: deals
        env:
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
        run: |
          export AMAZON_ASSOCIATE_TAG="${AMAZON_ASSOCIATE_TAG:-hotproduct033-20}"

          # Self-healing retry: attempt up to 3 times
          for attempt in 1 2 3; do
            echo "::notice::Deal fetch attempt $attempt/3 at $(date -u +'%H:%M:%S UTC')"
            set +e
            python fetch_daily_deals.py --max-verify 60 --min-discount 10 --deal-count 25 -v
            rc=$?
            set -e

            if [ "$rc" = "0" ]; then
              echo "::notice::Deal fetch succeeded on attempt $attempt"
              echo "rc=0" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ "$rc" = "2" ]; then
              echo "::warning::No qualifying deals found (attempt $attempt); continuing to build/deploy anyway"
              echo "rc=2" >> "$GITHUB_OUTPUT"
              exit 0
            else
              if [ "$attempt" -lt "3" ]; then
                wait_s=$((attempt * 30))
                echo "::warning::Deal fetch failed with rc=$rc on attempt $attempt; retrying in ${wait_s}s"
                sleep "$wait_s"
              else
                echo "::error::Deal fetch failed after 3 attempts with rc=$rc"
                echo "rc=$rc" >> "$GITHUB_OUTPUT"
                exit "$rc"
              fi
            fi
          done

      - name: Upload deal audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-deals-${{ github.run_id }}
          path: products/discovery/daily-deals-*.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Commit deal catalog changes
        if: steps.deals.outputs.rc == '0'
        run: |
          set -e
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add products/top-1000.csv site/public/products
          if git diff --staged --quiet; then
            echo "::notice::No deal catalog/image changes to commit"
            exit 0
          fi
          git commit -m "feat: limited-time sale batch $(date -u +%F) [skip ci]"

          # Self-healing push retry with auto-rebase
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "::notice::Deal catalog pushed successfully (attempt $attempt)"
              exit 0
            fi
            if [ "$attempt" -lt "3" ]; then
              echo "::warning::Push attempt $attempt failed; rebasing on origin/main and retrying"
              git fetch origin main
              git rebase origin/main
              sleep 10
            fi
          done
          echo "::error::Failed to push deal catalog after 3 attempts"
          exit 1

      - name: Build static site
        working-directory: site
        run: npm run build

      - name: Verify deployment secrets
        env:
          HOSTINGER_SSH_KEY_B64: ${{ secrets.HOSTINGER_SSH_KEY_B64 }}
          HOSTINGER_KNOWN_HOSTS: ${{ secrets.HOSTINGER_KNOWN_HOSTS }}
        run: |
          missing=""
          [ -z "$HOSTINGER_HOST" ] && missing="$missing HOSTINGER_HOST"
          [ -z "$HOSTINGER_USER" ] && missing="$missing HOSTINGER_USER"
          [ -z "$HOSTINGER_PORT" ] && missing="$missing HOSTINGER_PORT"
          [ -z "$HOSTINGER_SSH_KEY_B64" ] && missing="$missing HOSTINGER_SSH_KEY_B64"
          [ -z "$HOSTINGER_KNOWN_HOSTS" ] && missing="$missing HOSTINGER_KNOWN_HOSTS"

          if [ -n "$missing" ]; then
            echo "::error::Missing deployment secrets:$missing"
            exit 1
          fi
          echo "::notice::All deployment secrets configured"

      - name: Set up SSH for Hostinger
        env:
          HOSTINGER_SSH_KEY_B64: ${{ secrets.HOSTINGER_SSH_KEY_B64 }}
          HOSTINGER_KNOWN_HOSTS: ${{ secrets.HOSTINGER_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s' "$HOSTINGER_SSH_KEY_B64" | tr -d '[:space:]' | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          if ! ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null; then
            echo "::error::Invalid HOSTINGER_SSH_KEY_B64: ssh-keygen validation failed"
            exit 1
          fi

          printf '%s\n' "$HOSTINGER_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          if ! grep -Eq '^[^#[:space:]]' ~/.ssh/known_hosts; then
            echo "::error::HOSTINGER_KNOWN_HOSTS contains no usable host keys"
            exit 1
          fi

          cat >> ~/.ssh/config <<'EOF'
          Host *
              ControlMaster auto
              ControlPath ~/.ssh/cm-%r@%h:%p
              ControlPersist 10m
          EOF
          chmod 600 ~/.ssh/config
          echo "::notice::SSH configuration completed"

      - name: SSH connectivity smoke test
        run: |
          set -e
          attempt=1
          max_attempts=4
          while : ; do
            if ssh -p "$HOSTINGER_PORT" -i ~/.ssh/id_rsa \
                -o BatchMode=yes \
                -o ConnectTimeout=30 \
                -o ConnectionAttempts=3 \
                -o ServerAliveInterval=20 \
                -o ServerAliveCountMax=6 \
                -o StrictHostKeyChecking=yes \
                -o UserKnownHostsFile=~/.ssh/known_hosts \
                "$HOSTINGER_USER@$HOSTINGER_HOST" \
                "echo OK from \$(hostname) && pwd && ls -ld $HOSTINGER_DEST"; then
              echo "::notice::SSH connectivity verified (attempt $attempt)"
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::SSH connectivity failed after $max_attempts attempts"
              exit 1
            fi
            wait_s=$((attempt * 15))
            echo "::warning::SSH attempt $attempt failed; retrying in ${wait_s}s"
            sleep "$wait_s"
            attempt=$((attempt + 1))
          done

      - name: Rsync to Hostinger
        run: |
          set -e
          attempt=1
          max_attempts=3
          while : ; do
            if rsync -avz --delete --partial --timeout=60 \
                --exclude='.htaccess' \
                --exclude='.htpasswd' \
                --exclude='.well-known/' \
                --exclude='cgi-bin/' \
                --exclude='.user.ini' \
                --exclude='error_log' \
                --exclude='error_log.*' \
                --exclude='php.ini' \
                -e "ssh -p $HOSTINGER_PORT -i ~/.ssh/id_rsa -o BatchMode=yes -o ConnectTimeout=30 -o ConnectionAttempts=3 -o ServerAliveInterval=20 -o ServerAliveCountMax=6 -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
                site/out/ \
                "$HOSTINGER_USER@$HOSTINGER_HOST:$HOSTINGER_DEST"; then
              echo "::notice::Deployment to Hostinger succeeded (attempt $attempt)"
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::Deployment to Hostinger failed after $max_attempts attempts"
              exit 1
            fi
            wait_s=$((attempt * 30))
            echo "::warning::Rsync attempt $attempt failed; retrying in ${wait_s}s"
            sleep "$wait_s"
            attempt=$((attempt + 1))
          done

      - name: Count deals for notification
        if: always()
        id: deal_count
        run: |
          deal_count=0
          latest=$(ls -t products/discovery/daily-deals-*.json 2>/dev/null | head -1)
          if [ -n "$latest" ] && [ -f "$latest" ]; then
            deal_count=$(jq 'length' "$latest" 2>/dev/null || echo "0")
          fi
          echo "count=$deal_count" >> "$GITHUB_OUTPUT"

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::notice::Telegram secrets not configured; skipping notification"
            exit 0
          fi

          status="${{ job.status }}"
          deals="${{ steps.deal_count.outputs.count }}"
          timestamp="$(date -u +'%Y-%m-%d %H:%M UTC')"

          if [ "$status" = "success" ]; then
            status_emoji="✅"
            status_text="SUCCESS"
          else
            status_emoji="❌"
            status_text="FAILED"
          fi

          message="$status_emoji Daily Deals Workflow $status_text

Time: $timestamp
Deals Found: $deals
Job Status: $status"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="$message" > /dev/null 2>&1

          if [ $? -eq 0 ]; then
            echo "::notice::Telegram notification sent"
          else
            echo "::warning::Failed to send Telegram notification"
          fi

      - name: Workflow completion summary
        if: always()
        run: |
          echo "::notice::Daily deals workflow completed at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::✓ Workflow succeeded (Deals: ${{ steps.deal_count.outputs.count }})"
          else
            echo "::error::✗ Workflow failed with status: ${{ job.status }}"
          fi
