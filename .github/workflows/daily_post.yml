name: 📢 Daily Social Post + Deploy

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC = 9:00 AM CDT (summer) / 8:00 AM CST (winter)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY RUN (default: OFF — manual dispatch posts for real). Toggle ON to compose + upload banners without posting."
        required: false
        type: boolean
        default: false

jobs:
  post-and-deploy:
    name: 4 IG posts → build → rsync to Hostinger
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    env:
      HOSTINGER_HOST: 145.79.4.128
      HOSTINGER_USER: u143258947
      HOSTINGER_PORT: 65002
      HOSTINGER_DEST: domains/hotproductsdot.com/public_html/

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      # Cache Next.js's incremental build artifacts (.next/cache) so subsequent
      # builds reuse webpack module hashes, RSC payloads, and image-optimization
      # output. The cache key is keyed on the lockfile + every .ts/.tsx/.js
      # source file in site/, so any source change busts the cache and triggers
      # a clean rebuild.
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: site/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('site/package-lock.json') }}-${{ hashFiles('site/**/*.ts', 'site/**/*.tsx', 'site/**/*.js', 'site/**/*.mjs') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('site/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Post 4 products to Instagram
        env:
          # AI vision gate enforces semantic banner quality (scene clutter,
          # brand mismatch, weird crops, anything heuristics can't measure).
          # Verified locally on 5 banners — flip to "shadow" to log without
          # blocking, "off" to skip the API call entirely.
          BANNER_AI_GATE: enforce
          # Posting policy:
          #   - schedule:          REAL POSTING (production daily cron).
          #   - workflow_dispatch: honors the dry_run checkbox (default ON,
          #                        so manual runs stay safe-by-default).
          # Validators (BANNER_AI_GATE=enforce + --catalog-image-only) gate
          # bad banners regardless of trigger.
          #
          # The decision lives in bash, not a GHA expression: an earlier
          # `(cond) && '' || '--dry-run'` form silently always returned
          # '--dry-run' because empty string is falsy in GHA, cascading
          # through the ||. That bug forced every dispatch into dry-run
          # regardless of the input checkbox.
          EVENT_NAME:    ${{ github.event_name }}
          DRY_RUN_INPUT: ${{ inputs.dry_run }}
          IG_USER_ID:          ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:     ${{ secrets.IG_ACCESS_TOKEN }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          # Cloudinary is the sole image host for Instagram banners; ImgBB was
          # dropped (commits 82cf6ab0, 7dbbb8d1) because Meta blocks i.ibb.co.
          CLOUDINARY_URL:      ${{ secrets.CLOUDINARY_URL }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          # TAVILY grounds the --ad-creative banner in real-world reference
          # images. Missing key only degrades quality (Gemini still runs
          # without references) — the pipeline does not error out.
          TAVILY_API_KEY:      ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          MODELSLAB_KEY:       ${{ secrets.MODELSLAB_KEY }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ]; then
            DRY_RUN_FLAG=""
            echo "Mode: REAL POSTING (scheduled cron)"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DRY_RUN_INPUT" = "false" ]; then
            DRY_RUN_FLAG=""
            echo "Mode: REAL POSTING (manual dispatch with dry_run=false)"
          else
            DRY_RUN_FLAG="--dry-run"
            echo "Mode: DRY RUN (event=$EVENT_NAME dry_run_input=$DRY_RUN_INPUT)"
          fi

          # Exit-code contract from post_daily.py:
          #   0 = at least one platform posted successfully
          #   1 = at least one platform attempted and failed
          #   2 = banner quality_blocked (product quarantined, no post)
          #   3 = no platform attempted (dry-run or operator skipped approval)
          # Counting only rc=0 as "posted" prevents dry-run iterations from
          # masquerading as successful posts (the old `if python ...; then ok++`
          # form treated rc=0 from a skip as a real post).
          posts_ok=0
          posts_skipped=0
          posts_blocked=0
          for i in 1 2 3 4; do
            echo "::group::Post $i/4"
            # --ad-creative: AI-generated ad-creative banner (Gemini Nano Banana
            # Pro grounded on Tavily reference imagery). The white-card pipeline
            # replaced rembg cutouts, so the historical reason for forcing
            # --catalog-image-only is gone. Stochastic flakiness now lands in
            # quality_blocked (rc=2) rather than corrupting banners.
            python post_daily.py --platform instagram --ad-creative $DRY_RUN_FLAG && rc=0 || rc=$?
            case "$rc" in
              0) posts_ok=$((posts_ok + 1)); echo "Post $i: posted (rc=0)" ;;
              2) posts_blocked=$((posts_blocked + 1)); echo "::notice::Post $i quality_blocked (rc=2)" ;;
              3) posts_skipped=$((posts_skipped + 1)); echo "::notice::Post $i skipped (rc=3, dry-run or unapproved)" ;;
              *) echo "::warning::Post $i failed (rc=$rc, continuing)" ;;
            esac
            echo "::endgroup::"
          done
          echo "Posts: ${posts_ok} posted, ${posts_skipped} skipped, ${posts_blocked} blocked (of 4)"
          # Real-posting runs require at least one true post.
          # Dry-run / skipped runs are allowed to proceed to build+deploy with no posts.
          if [ -z "$DRY_RUN_FLAG" ] && [ "$posts_ok" -eq 0 ]; then
            echo "::error::Real-posting run produced 0 successful posts — aborting deploy"
            exit 1
          fi

      # Commit the post log immediately after posting succeeds, BEFORE build/deploy.
      # If we deferred this until after rsync (the previous behavior), any deploy
      # failure would orphan the day's post records — the next run's dedup logic
      # would then re-pick the same products (e.g. DJI Air 3S re-selected on
      # consecutive days because yesterday's deploy hiccup blocked the log push).
      - name: Commit post log (pre-deploy)
        # Match the same gate as DRY_RUN_FLAG: commit log entries whenever
        # this run actually posted — schedule (always real) or
        # workflow_dispatch with dry_run=false. Dry-run dispatches don't
        # produce log changes anyway, but keeping the condition consistent
        # avoids future drift.
        if: success() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run))
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add marketing-campaigns/post_log.csv
          git diff --staged --quiet || (
            git commit -m "chore: daily rotation $(date -u +%F) [skip ci]" &&
            git pull --rebase --autostash origin main &&
            git push
          )

      - name: Build static site
        working-directory: site
        run: npm run build

      - name: Set up SSH for Hostinger
        env:
          HOSTINGER_SSH_KEY_B64: ${{ secrets.HOSTINGER_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # 1. Verify secret is present (without leaking it)
          if [ -z "${HOSTINGER_SSH_KEY_B64:-}" ]; then
            echo "::error::HOSTINGER_SSH_KEY_B64 secret is empty or unset"
            exit 1
          fi
          echo "Secret length (base64 chars): ${#HOSTINGER_SSH_KEY_B64}"

          # 2. Decode. Use printf (not echo) to avoid trailing newline mismatch
          # and pipe through tr -d to strip any whitespace/CR that may have crept
          # into the secret value via the GitHub UI.
          printf '%s' "$HOSTINGER_SSH_KEY_B64" | tr -d '[:space:]' | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 3. Diagnostics on the decoded key (safe — only metadata)
          KEY_BYTES=$(wc -c < ~/.ssh/id_rsa)
          echo "Decoded key bytes: $KEY_BYTES"
          if [ "$KEY_BYTES" -lt 100 ]; then
            echo "::error::Decoded key suspiciously small — likely bad base64"
            exit 1
          fi
          if grep -q $'\r' ~/.ssh/id_rsa; then
            echo "::warning::Key contains CR characters — stripping"
            tr -d '\r' < ~/.ssh/id_rsa > ~/.ssh/id_rsa.clean
            mv ~/.ssh/id_rsa.clean ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
          fi
          echo "Key first line: $(head -1 ~/.ssh/id_rsa)"
          echo "Key last line:  $(tail -1 ~/.ssh/id_rsa)"

          # 4. Parse-check (don't silence stderr — we want the real error)
          if ! ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null; then
            echo "::error::ssh-keygen rejected the key. Re-encode locally with: base64 -w0 < ~/.ssh/hostinger_key | pbcopy"
            exit 1
          fi
          echo "Key parses OK"

          # 5. Capture host key (don't silence stderr; only suppress "comments")
          ssh-keyscan -p "$HOSTINGER_PORT" -H "$HOSTINGER_HOST" >> ~/.ssh/known_hosts 2> /tmp/keyscan.err
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "::error::ssh-keyscan returned no host keys. stderr:"
            cat /tmp/keyscan.err
            exit 1
          fi

      - name: SSH connectivity smoke test
        run: |
          set -e
          ssh -p "$HOSTINGER_PORT" -i ~/.ssh/id_rsa \
              -o BatchMode=yes -o ConnectTimeout=10 \
              "$HOSTINGER_USER@$HOSTINGER_HOST" \
              "echo OK from \$(hostname) && pwd && ls -ld $HOSTINGER_DEST"

      - name: Rsync to Hostinger
        # --delete removes anything in dest not present in source. The
        # exclude list below preserves files Hostinger generates server-side
        # that the static export doesn't (and shouldn't) ship — losing any
        # of these would break SSL renewal, panel-managed caching, or PHP
        # behavior. site/out/ contains none of these patterns, so they
        # cannot legitimately be re-introduced from source.
        run: |
          rsync -avz --delete \
            --exclude='.htaccess' \
            --exclude='.htpasswd' \
            --exclude='.well-known/' \
            --exclude='cgi-bin/' \
            --exclude='.user.ini' \
            --exclude='error_log' \
            --exclude='error_log.*' \
            --exclude='php.ini' \
            -e "ssh -p $HOSTINGER_PORT -i ~/.ssh/id_rsa" \
            site/out/ \
            "$HOSTINGER_USER@$HOSTINGER_HOST:$HOSTINGER_DEST"

      - name: Upload composed banners as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: banners-${{ github.run_id }}
          path: generated_images/**/banner.jpg
          if-no-files-found: warn
          retention-days: 14
