name: 📢 Daily Social Post + Deploy

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC = 9:00 AM CDT (summer) / 8:00 AM CST (winter)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  post-and-deploy:
    name: 4 IG posts → build → rsync to Hostinger
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    env:
      HOSTINGER_HOST: 145.79.4.128
      HOSTINGER_USER: u143258947
      HOSTINGER_PORT: 65002
      HOSTINGER_DEST: domains/hotproductsdot.com/public_html/

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Post 4 products to Instagram
        env:
          IG_USER_ID:          ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:     ${{ secrets.IG_ACCESS_TOKEN }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          IMGBB_API_KEY:       ${{ secrets.IMGBB_API_KEY }}
          CLOUDINARY_URL:      ${{ secrets.CLOUDINARY_URL }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          MODELSLAB_KEY:       ${{ secrets.MODELSLAB_KEY }}
        run: |
          posts_ok=0
          for i in 1 2 3 4; do
            echo "::group::Post $i/4"
            # --catalog-image-only: skip stochastic Gemini variants. They occasionally
            # produce white-on-light backgrounds that rembg can't cleanly cut, leaving
            # rectangular artifacts behind the product. Catalog images are deterministic.
            if python post_daily.py --platform instagram --catalog-image-only; then
              posts_ok=$((posts_ok + 1))
            else
              echo "::warning::Post $i failed (continuing)"
            fi
            echo "::endgroup::"
          done
          echo "Posts succeeded: $posts_ok / 4"
          if [ "$posts_ok" -eq 0 ]; then
            echo "::error::All 4 posts failed — aborting deploy"
            exit 1
          fi

      - name: Build static site
        working-directory: site
        run: npm run build

      - name: Set up SSH for Hostinger
        run: |
          mkdir -p ~/.ssh
          # Strip CR (Windows-style line endings) — pasted Windows keys break libcrypto
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Sanity-check the key parses before rsync (fails fast with a clear message)
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null
          ssh-keyscan -p "$HOSTINGER_PORT" -H "$HOSTINGER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to Hostinger
        run: |
          rsync -avz --delete \
            -e "ssh -p $HOSTINGER_PORT -i ~/.ssh/id_rsa" \
            site/out/ \
            "$HOSTINGER_USER@$HOSTINGER_HOST:$HOSTINGER_DEST"

      - name: Commit post log
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add marketing-campaigns/post_log.csv
          git diff --staged --quiet || (
            git commit -m "chore: daily rotation $(date -u +%F) [skip ci]" &&
            git pull --rebase --autostash origin main &&
            git push
          )
