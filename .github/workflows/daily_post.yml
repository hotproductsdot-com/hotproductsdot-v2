name: 📢 Daily Social Post + Deploy

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC = 9:00 AM CDT (summer) / 8:00 AM CST (winter)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY RUN (default: ON) — compose + upload banners but skip IG posts. Toggle OFF to actually post to Instagram."
        required: false
        type: boolean
        default: true

jobs:
  post-and-deploy:
    name: 4 IG posts → build → rsync to Hostinger
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    env:
      HOSTINGER_HOST: 145.79.4.128
      HOSTINGER_USER: u143258947
      HOSTINGER_PORT: 65002
      HOSTINGER_DEST: domains/hotproductsdot.com/public_html/

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Post 4 products to Instagram
        env:
          # AI vision gate enforces semantic banner quality (scene clutter,
          # brand mismatch, weird crops, anything heuristics can't measure).
          # Verified locally on 5 banners — flip to "shadow" to log without
          # blocking, "off" to skip the API call entirely.
          BANNER_AI_GATE: enforce
          # Safe-by-default: only post to Instagram when this is a manual
          # workflow_dispatch AND the operator has explicitly toggled dry_run
          # OFF. Scheduled cron runs always dry-run (compose + upload to
          # artifacts only) so unattended posting can't ship bad banners
          # while validators are still maturing. Operator approves each batch
          # by triggering "Run workflow" with dry_run unchecked.
          #
          # The decision lives in bash, not a GHA expression: an earlier
          # `(cond) && '' || '--dry-run'` form silently always returned
          # '--dry-run' because empty string is falsy in GHA, cascading
          # through the ||. That bug forced every dispatch into dry-run
          # regardless of the input checkbox.
          EVENT_NAME:    ${{ github.event_name }}
          DRY_RUN_INPUT: ${{ inputs.dry_run }}
          IG_USER_ID:          ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:     ${{ secrets.IG_ACCESS_TOKEN }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          # Cloudinary is the sole image host for Instagram banners; ImgBB was
          # dropped (commits 82cf6ab0, 7dbbb8d1) because Meta blocks i.ibb.co.
          CLOUDINARY_URL:      ${{ secrets.CLOUDINARY_URL }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          # TAVILY grounds the --ad-creative banner in real-world reference
          # images. Missing key only degrades quality (Gemini still runs
          # without references) — the pipeline does not error out.
          TAVILY_API_KEY:      ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          MODELSLAB_KEY:       ${{ secrets.MODELSLAB_KEY }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DRY_RUN_INPUT" = "false" ]; then
            DRY_RUN_FLAG=""
            echo "Mode: REAL POSTING (manual dispatch with dry_run=false)"
          else
            DRY_RUN_FLAG="--dry-run"
            echo "Mode: DRY RUN (event=$EVENT_NAME dry_run_input=$DRY_RUN_INPUT)"
          fi

          posts_ok=0
          for i in 1 2 3 4; do
            echo "::group::Post $i/4"
            # --catalog-image-only: skip stochastic Gemini variants. They occasionally
            # produce white-on-light backgrounds that rembg can't cleanly cut, leaving
            # rectangular artifacts behind the product. Catalog images are deterministic.
            if python post_daily.py --platform instagram --catalog-image-only --ad-creative $DRY_RUN_FLAG; then
              posts_ok=$((posts_ok + 1))
            else
              echo "::warning::Post $i failed (continuing)"
            fi
            echo "::endgroup::"
          done
          echo "Posts succeeded: $posts_ok / 4"
          if [ "$posts_ok" -eq 0 ]; then
            echo "::error::All 4 posts failed — aborting deploy"
            exit 1
          fi

      # Commit the post log immediately after posting succeeds, BEFORE build/deploy.
      # If we deferred this until after rsync (the previous behavior), any deploy
      # failure would orphan the day's post records — the next run's dedup logic
      # would then re-pick the same products (e.g. DJI Air 3S re-selected on
      # consecutive days because yesterday's deploy hiccup blocked the log push).
      - name: Commit post log (pre-deploy)
        # Match the same gate as DRY_RUN_FLAG: only commit log entries when
        # this run actually posted (workflow_dispatch with dry_run=false).
        # Cron runs and dry-run dispatches don't produce log changes anyway,
        # but keeping the condition consistent avoids future drift.
        if: success() && github.event_name == 'workflow_dispatch' && !inputs.dry_run
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add marketing-campaigns/post_log.csv
          git diff --staged --quiet || (
            git commit -m "chore: daily rotation $(date -u +%F) [skip ci]" &&
            git pull --rebase --autostash origin main &&
            git push
          )

      - name: Build static site
        working-directory: site
        run: npm run build

      - name: Set up SSH for Hostinger
        env:
          HOSTINGER_SSH_KEY_B64: ${{ secrets.HOSTINGER_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # 1. Verify secret is present (without leaking it)
          if [ -z "${HOSTINGER_SSH_KEY_B64:-}" ]; then
            echo "::error::HOSTINGER_SSH_KEY_B64 secret is empty or unset"
            exit 1
          fi
          echo "Secret length (base64 chars): ${#HOSTINGER_SSH_KEY_B64}"

          # 2. Decode. Use printf (not echo) to avoid trailing newline mismatch
          # and pipe through tr -d to strip any whitespace/CR that may have crept
          # into the secret value via the GitHub UI.
          printf '%s' "$HOSTINGER_SSH_KEY_B64" | tr -d '[:space:]' | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 3. Diagnostics on the decoded key (safe — only metadata)
          KEY_BYTES=$(wc -c < ~/.ssh/id_rsa)
          echo "Decoded key bytes: $KEY_BYTES"
          if [ "$KEY_BYTES" -lt 100 ]; then
            echo "::error::Decoded key suspiciously small — likely bad base64"
            exit 1
          fi
          if grep -q $'\r' ~/.ssh/id_rsa; then
            echo "::warning::Key contains CR characters — stripping"
            tr -d '\r' < ~/.ssh/id_rsa > ~/.ssh/id_rsa.clean
            mv ~/.ssh/id_rsa.clean ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
          fi
          echo "Key first line: $(head -1 ~/.ssh/id_rsa)"
          echo "Key last line:  $(tail -1 ~/.ssh/id_rsa)"

          # 4. Parse-check (don't silence stderr — we want the real error)
          if ! ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null; then
            echo "::error::ssh-keygen rejected the key. Re-encode locally with: base64 -w0 < ~/.ssh/hostinger_key | pbcopy"
            exit 1
          fi
          echo "Key parses OK"

          # 5. Capture host key (don't silence stderr; only suppress "comments")
          ssh-keyscan -p "$HOSTINGER_PORT" -H "$HOSTINGER_HOST" >> ~/.ssh/known_hosts 2> /tmp/keyscan.err
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "::error::ssh-keyscan returned no host keys. stderr:"
            cat /tmp/keyscan.err
            exit 1
          fi

      - name: SSH connectivity smoke test
        run: |
          set -e
          ssh -p "$HOSTINGER_PORT" -i ~/.ssh/id_rsa \
              -o BatchMode=yes -o ConnectTimeout=10 \
              "$HOSTINGER_USER@$HOSTINGER_HOST" \
              "echo OK from \$(hostname) && pwd && ls -ld $HOSTINGER_DEST"

      - name: Rsync to Hostinger
        run: |
          rsync -avz --delete \
            -e "ssh -p $HOSTINGER_PORT -i ~/.ssh/id_rsa" \
            site/out/ \
            "$HOSTINGER_USER@$HOSTINGER_HOST:$HOSTINGER_DEST"

      - name: Upload composed banners as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: banners-${{ github.run_id }}
          path: generated_images/**/banner.jpg
          if-no-files-found: warn
          retention-days: 14
