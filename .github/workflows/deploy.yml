name: 🚀 Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: 🎉 Build & Deploy (delta only)
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: 📥 Install dependencies
        run: cd site && npm ci

      - name: 🗄️ Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: site/.next/cache
          key: nextjs-${{ hashFiles('site/package-lock.json', 'site/next.config.ts') }}-${{ hashFiles('products/top-1000.csv', 'site/app/**', 'site/prebuild.js') }}
          restore-keys: |
            nextjs-${{ hashFiles('site/package-lock.json', 'site/next.config.ts') }}-

      - name: 🔨 Build site
        run: cd site && npm run build
        env:
          FORCE_BUILD: 1

      - name: 📂 Sync changed files to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./site/out/
          server-dir: ./domains/hotproductsdot.com/public_html/
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/*
            **/.ftp-deploy-sync-state.json
