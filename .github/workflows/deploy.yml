name: 🚀 Build & Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # Daily rotation is now handled by rotate.yml (no full rebuild needed).

jobs:
  build-and-deploy:
    name: 🎉 Build & Deploy (delta only)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: 📥 Install dependencies
        run: cd site && npm ci

      - name: 🗓️ Featured rotation date (UTC)
        id: cal
        run: echo "day=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: 🗄️ Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: site/.next/cache
          key: nextjs-${{ hashFiles('site/package-lock.json', 'site/next.config.ts') }}-${{ hashFiles('products/top-1000.csv', 'site/app/**', 'site/prebuild.js') }}-${{ steps.cal.outputs.day }}
          restore-keys: |
            nextjs-${{ hashFiles('site/package-lock.json', 'site/next.config.ts') }}-

      - name: 🔨 Build site
        run: cd site && npm run build
        env:
          FORCE_BUILD: 1
          FEATURED_DAY: ${{ steps.cal.outputs.day }}

      - name: 📄 Extract rotation base
        run: cd site && node scripts/extract-rotation-base.js

      - name: 💾 Commit rotation-base.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/rotation-base.html
          if ! git diff --staged --quiet; then
            git commit -m "chore: update rotation-base.html [skip ci]"
            git push
          fi

      - name: 📂 Sync changed files to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./site/out/
          server-dir: ./domains/hotproductsdot.com/public_html/
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/*
            /.ftp-deploy-sync-state.json
