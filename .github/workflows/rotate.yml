name: 🔄 Daily Homepage Rotation

on:
  schedule:
    # Runs daily at 07:35 UTC — same slot the full build used to occupy.
    # GitHub schedule cron is UTC-only; `timezone:` is unsupported.
    # 12:35 UTC = 7:35 AM CDT.
    - cron: "35 12 * * *"
  workflow_dispatch:

jobs:
  rotate:
    name: 🗓️ Trigger Hostinger redeploy for daily rotation
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🗓️ Featured rotation date (UTC)
        id: cal
        run: echo "day=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: 🚀 Push empty commit to trigger Hostinger auto-deploy
        run: |
          git config user.email "action@github.com"
          git config user.name  "GitHub Action"
          git commit --allow-empty -m "chore: daily rotation ${{ steps.cal.outputs.day }} [skip ci]"
          git push origin HEAD:main
