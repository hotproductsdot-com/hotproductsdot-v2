name: 🚀 FTP Deploy only

on:
  push:
    branches:
      - main   # or whatever you use

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Sync files to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # path where your already-built files live in the repo:
          local-dir: ./site/out
          # path on Hostinger:
          server-dir: /hotproductsdot.com/public_html/
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/*
